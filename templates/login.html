<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudVault — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #5b8af5;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --error: #f87171;
    --success: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(91,138,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,138,245,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .glow1 { background: #5b8af5; top: -200px; left: -200px; }
  .glow2 { background: #a78bfa; bottom: -200px; right: -200px; animation-delay: -4s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

  .card {
    position: relative; z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(91,138,245,0.08);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .tabs {
    display: flex; gap: 4px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1; padding: 10px;
    border: none; border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .form { display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn {
    margin-top: 8px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    display: none;
  }
  .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
  .msg.success { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
  .msg.show { display: block; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">☁️</div>
    <div class="logo-text">Cloud<span>Vault</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- Login Form -->
  <div id="loginForm" class="form">
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="your_username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" onclick="doLogin()">Sign In →</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="form hidden">
    <div class="field">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="choose_username"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@email.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="min 6 characters"/>
    </div>
    <button class="btn" onclick="doRegister()">Create Account →</button>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg ${type} show`;
  }
  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) return showMsg('Please fill all fields', 'error');
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.success) { showMsg('Welcome back!', 'success'); setTimeout(() => location.reload(), 800); }
    else showMsg(data.error || 'Login failed', 'error');
  }

  async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!username || !email || !password) return showMsg('Please fill all fields', 'error');
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    if (data.success) { showMsg('Account created! Loading...', 'success'); setTimeout(() => location.reload(), 800); }
    else showMsg(data.error || 'Registration failed', 'error');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.getElementById('loginForm').classList.contains('hidden') ? 'register' : 'login';
      active === 'login' ? doLogin() : doRegister();
    }
  });
</script>
</body>
</html>
