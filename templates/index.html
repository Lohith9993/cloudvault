<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudVault — File Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #5b8af5;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --error: #f87171;
    --success: #34d399;
    --warning: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* BACKGROUND */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(91,138,245,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,138,245,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* NAVBAR */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-size: 18px; font-weight: 800; }
  .logo-text span { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px; font-weight: 600;
  }
  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
  }
  .btn-logout {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--error); color: var(--error); }

  /* MAIN LAYOUT */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

  /* STATS BAR */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 800; font-family: 'Space Mono', monospace; }
  .stat-value.accent { color: var(--accent); }

  /* STORAGE PROGRESS */
  .storage-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .storage-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
  .storage-track {
    height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .storage-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s ease;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px;
  }

  .filter-tabs { display: flex; gap: 4px; }
  .filter-btn {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .view-btns { display: flex; gap: 4px; }
  .view-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .view-btn.active { border-color: var(--accent); color: var(--accent); }

  .btn-upload {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-upload:hover { opacity: 0.85; }

  /* DRAG DROP ZONE */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    margin-bottom: 24px;
    transition: all 0.2s;
    display: none;
  }
  .drop-zone.visible { display: block; }
  .drop-zone.dragover { border-color: var(--accent); background: rgba(91,138,245,0.05); }
  .drop-zone p { color: var(--muted); font-size: 14px; margin-top: 8px; }

  /* FILE GRID */
  #fileGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  #fileGrid.list-view {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeIn 0.3s ease;
    cursor: pointer;
  }
  .file-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .file-preview {
    height: 120px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    overflow: hidden;
  }
  .file-preview img, .file-preview video {
    width: 100%; height: 100%; object-fit: cover;
  }

  .file-info { padding: 12px; }
  .file-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .file-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .file-actions {
    display: flex; gap: 4px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1; padding: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px; cursor: pointer;
    transition: all 0.15s;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }
  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn.danger:hover { border-color: var(--error); color: var(--error); }
  .action-btn.share:hover { border-color: var(--success); color: var(--success); }

  /* LIST VIEW */
  #fileGrid.list-view .file-card { display: flex; align-items: center; }
  #fileGrid.list-view .file-preview { width: 56px; height: 56px; min-width: 56px; font-size: 24px; border-radius: 0; }
  #fileGrid.list-view .file-info { flex: 1; padding: 12px; }
  #fileGrid.list-view .file-actions { border-top: none; border-left: 1px solid var(--border); padding: 12px; flex-direction: column; gap: 4px; min-width: 90px; }

  /* EMPTY STATE */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--muted);
  }
  .empty .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%; max-width: 420px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; padding: 12px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
  }
  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border) !important; }

  /* SHARE MODAL */
  .share-link-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    margin-bottom: 8px;
  }
  .share-expire { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
    max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--error); color: var(--error); }

  /* PREVIEW MODAL */
  .preview-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  .preview-modal-overlay.show { display: flex; }
  .preview-modal {
    max-width: 90vw; max-height: 90vh;
    position: relative;
  }
  .preview-modal img, .preview-modal video, .preview-modal audio {
    max-width: 90vw; max-height: 85vh;
    border-radius: 12px;
  }
  .preview-close {
    position: absolute; top: -16px; right: -16px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  input[type="file"] { display: none; }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .filter-tabs { display: none; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">
    <div class="logo-icon">☁️</div>
    <div class="logo-text">Cloud<span>Vault</span></div>
  </div>
  <div class="nav-right">
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="usernameDisplay">Loading...</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- MAIN -->
<div class="container">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Files</div>
      <div class="stat-value accent" id="statFiles">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Storage Used</div>
      <div class="stat-value" id="statUsed">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Storage Limit</div>
      <div class="stat-value">50 MB</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Usage</div>
      <div class="stat-value accent" id="statPercent">—</div>
    </div>
  </div>

  <!-- STORAGE BAR -->
  <div class="storage-bar-wrap">
    <div class="storage-header">
      <span style="font-weight:600;">Storage</span>
      <span id="storageText" style="color:var(--muted);font-size:13px;">calculating...</span>
    </div>
    <div class="storage-track">
      <div class="storage-fill" id="storageFill" style="width:0%"></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search files..." oninput="loadFiles()"/>
    </div>
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('image', this)">Images</button>
      <button class="filter-btn" onclick="setFilter('document', this)">Docs</button>
      <button class="filter-btn" onclick="setFilter('video', this)">Videos</button>
    </div>
    <div class="view-btns">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">⊞</button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">☰</button>
    </div>
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">+ Upload</button>
    <input type="file" id="fileInput" multiple onchange="uploadFiles(this.files)"/>
  </div>

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <div style="font-size:40px;">📂</div>
    <p>Drop files here to upload</p>
  </div>

  <!-- FILE GRID -->
  <div id="fileGrid"></div>
</div>

<!-- RENAME MODAL -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>✏️ Rename File</h3>
    <input type="text" id="renameInput" placeholder="New filename"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('renameModal')">Cancel</button>
      <button class="btn-confirm" onclick="confirmRename()">Rename</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3>🔗 Share File</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Anyone with this link can download the file for 24 hours.</p>
    <div class="share-link-box" id="shareLinkBox">generating...</div>
    <div class="share-expire" id="shareExpire"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('shareModal')">Close</button>
      <button class="btn-confirm" onclick="copyShareLink()">📋 Copy Link</button>
    </div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div class="preview-modal-overlay" id="previewModal" onclick="closeModal('previewModal')">
  <div class="preview-modal" onclick="event.stopPropagation()">
    <div class="preview-close" onclick="closeModal('previewModal')">✕</div>
    <div id="previewContent"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  let currentFilter = 'all';
  let currentView = 'grid';
  let renameTarget = null;

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { location.href = '/'; return; }
    const data = await res.json();
    document.getElementById('usernameDisplay').textContent = data.username;
    document.getElementById('userAvatar').textContent = data.username[0].toUpperCase();
    loadFiles();
    loadStats();
    setupDrop();
  }

  // ── STATS ─────────────────────────────────────────────────────────────────
  async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statFiles').textContent = data.total_files;
    document.getElementById('statUsed').textContent = data.used_str;
    document.getElementById('statPercent').textContent = data.used_percent + '%';
    document.getElementById('storageFill').style.width = data.used_percent + '%';
    document.getElementById('storageText').textContent = `${data.used_str} of ${data.limit_str}`;
  }

  // ── FILES ─────────────────────────────────────────────────────────────────
  async function loadFiles() {
    const search = document.getElementById('searchInput').value;
    const res = await fetch(`/api/files?search=${encodeURIComponent(search)}&type=${currentFilter}`);
    const data = await res.json();
    renderFiles(data.files);
  }

  function renderFiles(files) {
    const grid = document.getElementById('fileGrid');
    if (!files.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">📭</div>
        <h3>No files yet</h3>
        <p>Upload your first file using the button above</p>
      </div>`;
      return;
    }
    grid.innerHTML = files.map(f => fileCard(f)).join('');
  }

  function fileCard(f) {
    const icon = getIcon(f.type);
    const isImage = f.type.startsWith('image');
    const isVideo = f.type.startsWith('video');
    const previewHTML = isImage
      ? `<img src="${f.url}" loading="lazy" alt="${f.original_name}"/>`
      : isVideo
      ? `<video src="${f.url}" muted></video>`
      : `<span>${icon}</span>`;
    return `<div class="file-card" ondblclick="previewFile('${f.name}', '${f.type}', '${f.url}')">
      <div class="file-preview">${previewHTML}</div>
      <div class="file-info">
        <div class="file-name" title="${f.original_name}">${f.original_name}</div>
        <div class="file-meta">${f.size} · ${f.modified}</div>
      </div>
      <div class="file-actions">
        <button class="action-btn" onclick="previewFile('${f.name}','${f.type}','${f.url}')">👁 View</button>
        <button class="action-btn" onclick="openRename('${f.name}','${f.original_name}')">✏️</button>
        <button class="action-btn share" onclick="shareFile('${f.name}')">🔗</button>
        <button class="action-btn danger" onclick="deleteFile('${f.name}')">🗑</button>
      </div>
    </div>`;
  }

  function getIcon(mime) {
    if (mime.startsWith('image')) return '🖼️';
    if (mime.startsWith('video')) return '🎬';
    if (mime.startsWith('audio')) return '🎵';
    if (mime.includes('pdf')) return '📄';
    if (mime.includes('word') || mime.includes('document')) return '📝';
    if (mime.includes('sheet') || mime.includes('excel')) return '📊';
    if (mime.includes('zip') || mime.includes('rar')) return '🗜️';
    return '📁';
  }

  // ── UPLOAD ────────────────────────────────────────────────────────────────
  async function uploadFiles(files) {
    if (!files.length) return;
    const form = new FormData();
    for (const f of files) form.append('files', f);
    showToast('Uploading...', '');
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.count) {
      showToast(`✅ ${data.count} file(s) uploaded`, 'success');
      loadFiles(); loadStats();
    } else {
      showToast('Upload failed', 'error');
    }
    document.getElementById('fileInput').value = '';
  }

  // ── DELETE ────────────────────────────────────────────────────────────────
  async function deleteFile(filename) {
    if (!confirm('Delete this file?')) return;
    const res = await fetch(`/api/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) { showToast('🗑 File deleted', 'success'); loadFiles(); loadStats(); }
    else showToast('Delete failed', 'error');
  }

  // ── RENAME ────────────────────────────────────────────────────────────────
  function openRename(filename, originalName) {
    renameTarget = filename;
    document.getElementById('renameInput').value = originalName;
    document.getElementById('renameModal').classList.add('show');
    setTimeout(() => document.getElementById('renameInput').focus(), 100);
  }

  async function confirmRename() {
    const newName = document.getElementById('renameInput').value.trim();
    if (!newName || !renameTarget) return;
    const res = await fetch('/api/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: renameTarget, new_name: newName })
    });
    const data = await res.json();
    if (data.success) { showToast('✏️ File renamed', 'success'); closeModal('renameModal'); loadFiles(); }
    else showToast('Rename failed', 'error');
  }

  // ── SHARE ─────────────────────────────────────────────────────────────────
  async function shareFile(filename) {
    const res = await fetch(`/api/share/${encodeURIComponent(filename)}`, { method: 'POST' });
    const data = await res.json();
    if (data.share_url) {
      const fullUrl = window.location.origin + data.share_url;
      document.getElementById('shareLinkBox').textContent = fullUrl;
      document.getElementById('shareExpire').textContent = `⏰ Expires: ${new Date(data.expires).toLocaleString()}`;
      document.getElementById('shareModal').classList.add('show');
    }
  }

  let shareLink = '';
  function copyShareLink() {
    const link = document.getElementById('shareLinkBox').textContent;
    navigator.clipboard.writeText(link).then(() => showToast('📋 Link copied!', 'success'));
  }

  // ── PREVIEW ───────────────────────────────────────────────────────────────
  function previewFile(name, type, url) {
    const content = document.getElementById('previewContent');
    if (type.startsWith('image')) {
      content.innerHTML = `<img src="${url}" alt="${name}"/>`;
    } else if (type.startsWith('video')) {
      content.innerHTML = `<video src="${url}" controls autoplay style="max-width:80vw;max-height:80vh;border-radius:12px;"></video>`;
    } else if (type.startsWith('audio')) {
      content.innerHTML = `<audio src="${url}" controls style="width:360px;margin:40px auto;display:block;"></audio>`;
    } else {
      window.open(url, '_blank'); return;
    }
    document.getElementById('previewModal').classList.add('show');
  }

  // ── DRAG & DROP ───────────────────────────────────────────────────────────
  function setupDrop() {
    const zone = document.getElementById('dropZone');
    zone.classList.add('visible');
    document.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    document.addEventListener('dragleave', e => { if (!e.relatedTarget) zone.classList.remove('dragover'); });
    document.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });
  }

  // ── FILTER & VIEW ─────────────────────────────────────────────────────────
  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadFiles();
  }

  function setView(view) {
    currentView = view;
    const grid = document.getElementById('fileGrid');
    grid.classList.toggle('list-view', view === 'list');
    document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listBtn').classList.toggle('active', view === 'list');
  }

  // ── MODAL ─────────────────────────────────────────────────────────────────
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
    if (id === 'previewModal') document.getElementById('previewContent').innerHTML = '';
  }

  // ── TOAST ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  // ── LOGOUT ────────────────────────────────────────────────────────────────
  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    location.href = '/';
  }

  // ── KEYBOARD ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['renameModal','shareModal','previewModal'].forEach(closeModal);
    }
    if (e.key === 'Enter' && document.getElementById('renameModal').classList.contains('show')) {
      confirmRename();
    }
  });

  init();
</script>
</body>
</html>
