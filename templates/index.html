<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudVault – Cloud File Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">CV</div>
      <span>CloudVault</span>
    </div>

    <nav class="nav">
      <a class="nav-item active" data-filter="all" onclick="setFilter('all',this)">
        <svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
        All Files
      </a>
      <a class="nav-item" data-filter="image" onclick="setFilter('image',this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Images
      </a>
      <a class="nav-item" data-filter="document" onclick="setFilter('document',this)">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Documents
      </a>
      <a class="nav-item" data-filter="video" onclick="setFilter('video',this)">
        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Videos
      </a>
    </nav>

    <div class="storage-card">
      <div class="storage-label">Storage Used</div>
      <div class="storage-bar-wrap"><div class="storage-bar" id="storageBar"></div></div>
      <div class="storage-text"><span id="usedStr">0 MB</span> of <span id="limitStr">50 MB</span></div>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="totalFiles">0</div><div class="stat-lbl">Files</div></div>
      <div class="stat-box"><div class="stat-num" id="usedPct">0%</div><div class="stat-lbl">Used</div></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search files..." oninput="searchFiles()" />
      </div>
      <div class="topbar-actions">
        <button class="btn-view" onclick="setView('grid')" id="btnGrid" title="Grid view">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="btn-view" onclick="setView('list')" id="btnList" title="List view">
          <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Upload Files
        </button>
        <input type="file" id="fileInput" multiple hidden onchange="uploadFiles(this.files)" />
      </div>
    </header>

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-inner">
        <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <p>Drop files here to upload</p>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- File Grid -->
    <div class="files-header">
      <h2 id="sectionTitle">All Files</h2>
      <span class="file-count" id="fileCount">0 files</span>
    </div>

    <div class="files-grid" id="filesGrid"></div>
    <div class="files-list hidden" id="filesList"></div>

    <div class="empty-state hidden" id="emptyState">
      <svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      <p>No files yet. Upload something!</p>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div class="modal-overlay hidden" id="previewModal" onclick="closePreview(event)">
  <div class="modal">
    <div class="modal-header">
      <span id="previewName"></span>
      <button onclick="closePreviewBtn()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="previewBody"></div>
    <div class="modal-footer">
      <a id="previewDownload" href="#" download class="btn-download">Download</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
